name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Allows manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm pdf2office.spec

      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=dev-build" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Create Windows installer
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          makensis /DVERSION=$version /DOUT_FILE="PDF2Office-Setup-v$version-windows.exe" scripts\installer\windows.nsi

      - name: Create Windows portable archive
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          Compress-Archive -Path "dist/PDF2Office/*" -DestinationPath "PDF2Office-v$version-windows.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            PDF2Office-Setup-v${{ steps.get_version.outputs.version }}-windows.exe
            PDF2Office-v${{ steps.get_version.outputs.version }}-windows.zip

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: |
          python3 -m PyInstaller --noconfirm pdf2office.spec

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=dev-build" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create macOS DMG installer
        run: |
          version="${{ steps.get_version.outputs.version }}"
          hdiutil create -volname "PDF2Office" -srcfolder "dist/PDF2Office.app" -ov -format UDZO "PDF2Office-v${version}-macos.dmg"

      - name: Create macOS portable archive
        run: |
          cd dist
          zip -r ../PDF2Office-v${{ steps.get_version.outputs.version }}-macos.zip PDF2Office.app
          cd ..

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            PDF2Office-v${{ steps.get_version.outputs.version }}-macos.dmg
            PDF2Office-v${{ steps.get_version.outputs.version }}-macos.zip

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: |
          python3 -m PyInstaller --noconfirm pdf2office.spec

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=dev-build" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Linux archive
        run: |
          cd dist
          tar -czf ../PDF2Office-v${{ steps.get_version.outputs.version }}-linux.tar.gz PDF2Office
          cd ..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: PDF2Office-v${{ steps.get_version.outputs.version }}-linux.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=dev-build" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Display structure
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: PDF2Office v${{ steps.get_version.outputs.version }}
          body: |
            ## PDF2Office v${{ steps.get_version.outputs.version }}
            
            ### Downloads
            - **Windows installer**: `PDF2Office-Setup-v${{ steps.get_version.outputs.version }}-windows.exe`
            - **Windows portable**: `PDF2Office-v${{ steps.get_version.outputs.version }}-windows.zip`
            - **macOS installer**: `PDF2Office-v${{ steps.get_version.outputs.version }}-macos.dmg`
            - **macOS portable**: `PDF2Office-v${{ steps.get_version.outputs.version }}-macos.zip`
            - **Linux**: `PDF2Office-v${{ steps.get_version.outputs.version }}-linux.tar.gz`
            
            ### Installation
            1. Download the installer for your operating system
            2. Install:
               - Windows: Run `PDF2Office-Setup-v${{ steps.get_version.outputs.version }}-windows.exe`
               - macOS: Open `PDF2Office-v${{ steps.get_version.outputs.version }}-macos.dmg` and drag app to Applications
               - Linux: Extract `PDF2Office-v${{ steps.get_version.outputs.version }}-linux.tar.gz` and run `./PDF2Office`
            
            ### Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            windows-build/*
            macos-build/*
            linux-build/*
          draft: false
          prerelease: false
